DATA:
  VAL_SPLIT: test
  DATALOADER_NAME: torch_timm_custom
  IMG_SIZE: (448,448) 
  BATCH_SIZE: 16
  VAL_BATCH_SIZE: 48
  INTERPOLATION: bilinear
MODEL: 
  NUM_CLASSES: 200
  NAME: vit_base_patch16_224_in21k
  DROP_PATH_RATE: 0.1
TRAIN:
  EPOCHS: 50
  WARMUP_STEPS: 500
  WEIGHT_DECAY: 0.
  BASE_LR: 0.03
  WARMUP_LR: 1e-9
  MIN_LR: 1e-12
  OPTIMIZER:
    NAME: sgd
  CLIP_GRAD: 1.0
  LR_BS_SCALE: 64.0

AUG:
  NO_AUG: false
  SCALE: (0.7466666666,0.7466666666)  # 448/600
  RATIO: (1,1)

TEST:
  CROP: 0.7466666666  # 448/600 一定不能取更大，因为是向下取整
  BEST_METRIC: top1

MODEL_EMA: false
LOG_WANDB: true
TRAIN_MODE: train
EMA_DECAY: 0.9993