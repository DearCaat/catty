TEST:
  BEST_METRIC: auc
  CROP: 0.

MODEL:
  NAME: rdd_trans_swin_small_patch4_window7_224
  NUM_CLASSES: 2
DATA:
  NOR_CLS_INDEX: 0
AUG:
  MULTI_VIEW: strong_none

THUMB_MODE: false
BINARYTRAIN_MODE: true
  
RDD_TRANS:
  CLUSTER:
    CLUSTER_DISTANCE: cosine
    PERSISTENT_CENTER: true
    NAME: kmeans
    NUM_CLUSTER: 2
    SELECT_THR: 0.9 

  EMA_DECAY: 0.9998
  INST_NUM_CLASS: 2
  INST_TEST: true
  BAG_TEST: true
  TEST_THR: 0.9
  FILTER_SAMPLES: true
  # update it per iter
  THR_REL_EMA_DECAY: 0.9
  # 取最小的百分之几比例来更新，相对阈值是一种保证前提，保证一个包里面最少都要有这么多病害实例
  THR_REL_UPDATE_RATIO: 0.001
  # for update
  THR_ABS_DIS_LOW: 0.5
  THR_ABS_DIS_HIGH: 0.9

  THR_ABS_NOR_LOW: 0.5
  THR_ABS_NOR_HIGH: 0.7

  THR_FIL_NOR_LOW: 0.5
  THR_FIL_NOR_HIGH: 0.95

  THR_FIL_DIS: 0.8

  THR_ABS_DIS_: false
  THR_ABS_NOR_: true
  THR_REL_: true
